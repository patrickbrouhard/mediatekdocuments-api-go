services:
  mysql:
    image: mysql:9.1
    container_name: mediatekdocuments-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediatek86
      MYSQL_USER: mediatek
      MYSQL_PASSWORD: mediatek
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mediatek86.sql:/docker-entrypoint-initdb.d/01-mediatek86.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediatekdocuments-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mediatek
      DB_PASSWORD: mediatek
      DB_NAME: mediatek86
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
