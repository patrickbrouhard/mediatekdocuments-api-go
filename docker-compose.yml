services:
  mysql:
    image: mysql:9.1
    container_name: mediatekdocuments-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediatek86
      MYSQL_USER: mediatek
      MYSQL_PASSWORD: mediatek
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mediatek86.sql:/docker-entrypoint-initdb.d/01-mediatek86.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
